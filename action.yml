name: "Agent Gate for AI PRs"
description: "Checkout-free policy gate for AI-generated pull requests"
author: "Agent Gate contributors"

inputs:
  config:
    description: "Optional path to agent-gate.yml on the base branch; built-in defaults are used when the default path is confirmed missing"
    required: false
    default: "agent-gate.yml"
  github-token:
    description: "GitHub token used for API-only pull request reads"
    required: false
    default: "${{ github.token }}"
  mode:
    description: "Override config mode: observe, warn, or block"
    required: false
  comment:
    description: "Post or update a PR comment with the report"
    required: false
    default: "false"
  fail-on-block:
    description: "Exit with code 1 for complete block decisions; incomplete analysis always fails"
    required: false
    default: "true"
  report-json:
    description: "Path to write JSON report"
    required: false
    default: "agent-gate-report.json"
  report-markdown:
    description: "Path to write Markdown report"
    required: false
    default: "agent-gate-report.md"

outputs:
  decision:
    description: "pass, warn, or block"
  status:
    description: "passed, observed, needs-review, blocked, or incomplete"
  analysis-complete:
    description: "Whether Agent Gate received all evidence required for deterministic analysis"
  error-count:
    description: "Number of active error findings"
  warning-count:
    description: "Number of active warning findings"
  info-count:
    description: "Number of active informational findings"
  waived-count:
    description: "Number of findings covered by active base-policy waivers"
  expected-file-count:
    description: "Authoritative pull request changed_files count"
  analyzed-file-count:
    description: "Number of changed files included in deterministic analysis"
  risk-score:
    description: "Deprecated compatibility score; use status and finding counts"
  report-json:
    description: "Path to JSON report"
  report-markdown:
    description: "Path to Markdown report"

runs:
  using: "node24"
  main: "packages/action/dist/index.cjs"

branding:
  icon: "shield"
  color: "red"
