name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@11.5.0 --activate

      - name: Set up pnpm cache
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production and development dependencies
        run: pnpm audit --audit-level high

      - name: Build
        run: pnpm build

      - name: Check action bundle freshness
        run: |
          if ! git diff --exit-code -- packages/action/dist/index.cjs; then
            echo "::error::packages/action/dist/index.cjs is out of date. Run pnpm build and commit the rebuilt bundle."
            exit 1
          fi

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Set up Node.js 24 for action runtime smoke test
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Smoke test committed action bundle on Node 24
        run: |
          set +e
          node packages/action/dist/index.cjs > /tmp/mergewarden-action-smoke.log 2>&1
          exit_code=$?
          set -e

          echo "Sanitized smoke log:"
          sed 's/::/[colon-colon]/g' /tmp/mergewarden-action-smoke.log

          if [ "$exit_code" -eq 0 ]; then
            echo "ERROR: Action bundle unexpectedly succeeded without github-token input."
            exit 1
          fi

          if grep -q "Dynamic require" /tmp/mergewarden-action-smoke.log; then
            echo "ERROR: Action bundle hit a dynamic require runtime error."
            exit 1
          fi

          if ! grep -q "MergeWarden requires the github-token input." /tmp/mergewarden-action-smoke.log; then
            echo "ERROR: Action bundle did not reach the expected token validation path."
            exit 1
          fi

  cli-package-smoke:
    name: CLI package (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: "20"
          - os: ubuntu-latest
            node: "22"
          - os: ubuntu-latest
            node: "24"
          - os: windows-latest
            node: "24"
          - os: macos-latest
            node: "24"

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up build Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Activate pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.5.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Pack CLI artifact once
        shell: bash
        run: |
          pack_dir="$PWD/.mergewarden-pack"
          mkdir -p "$pack_dir"
          pnpm --filter mergewarden pack --pack-destination "$pack_dir"
          tarball="$(find "$pack_dir" -maxdepth 1 -name 'mergewarden-*.tgz' -print -quit)"
          test -n "$tarball"
          if command -v cygpath >/dev/null 2>&1; then
            tarball="$(cygpath -w "$tarball")"
          fi
          echo "CLI_TARBALL=$tarball" >> "$GITHUB_ENV"

      - name: Set up smoke-test Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}

      - name: Smoke-test exact CLI artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: node packages/cli/scripts/package-smoke.mjs "$CLI_TARBALL"
