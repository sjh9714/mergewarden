name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@11.5.0 --activate

      - name: Set up pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check action bundle freshness
        run: |
          if ! git diff --exit-code -- packages/action/dist/index.cjs; then
            echo "::error::packages/action/dist/index.cjs is out of date. Run pnpm build and commit the rebuilt bundle."
            exit 1
          fi

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Set up Node.js 20 for action runtime smoke test
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Smoke test committed action bundle on Node 20
        run: |
          set +e
          node packages/action/dist/index.cjs > /tmp/agent-gate-action-smoke.log 2>&1
          exit_code=$?
          set -e

          echo "Sanitized smoke log:"
          sed 's/::/[colon-colon]/g' /tmp/agent-gate-action-smoke.log

          if [ "$exit_code" -eq 0 ]; then
            echo "ERROR: Action bundle unexpectedly succeeded without github-token input."
            exit 1
          fi

          if grep -q "Dynamic require" /tmp/agent-gate-action-smoke.log; then
            echo "ERROR: Action bundle hit a dynamic require runtime error."
            exit 1
          fi

          if ! grep -q "Agent Gate requires the github-token input." /tmp/agent-gate-action-smoke.log; then
            echo "ERROR: Action bundle did not reach the expected token validation path."
            exit 1
          fi
