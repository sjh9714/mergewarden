name: Agent Gate

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  agent-gate:
    name: Agent Gate
    if: github.event.pull_request.base.sha != '6c9320a8a97548a39854dc4c1f922b12fe1bf3dd'
    runs-on: ubuntu-latest
    steps:
      - name: Run Agent Gate
        uses: sjh9714/Agent-Gate/packages/action@main
        with:
          config: agent-gate.yml
          mode: warn
          fail-on-block: "false"
          comment: "false"
