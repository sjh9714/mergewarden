name: Agent Gate

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  agent-gate:
    name: Agent Gate
    runs-on: ubuntu-latest
    steps:
      - name: Run Agent Gate
        uses: sjh9714/Agent-Gate/packages/action@main
        with:
          config: agent-gate.yml
          mode: warn
          fail-on-block: "false"
          comment: "false"
