name: Agent Gate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - labeled
      - unlabeled
      - ready_for_review

concurrency:
  group: agent-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  agent-gate:
    name: Agent Gate
    runs-on: ubuntu-latest
    steps:
      - name: Run Agent Gate
        uses: sjh9714/Agent-Gate/packages/action@main
        with:
          config: agent-gate.yml
          mode: warn
          fail-on-block: "false"
          comment: "false"
